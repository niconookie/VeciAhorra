<!doctype html>
<html lang="es">
<head><meta charset="utf-8"><title>Customer Panel Purchases List Test</title></head>
<body>
<script>
(async function () {
    'use strict';

    var panelScript = '../../assets/frontend/js/customer-panel.js';
    var scenarios = {};
    var failures = [];
    var expectedError = 'No pudimos cargar tus compras. Inténtalo nuevamente.';

    function assert(condition, message) {
        if (!condition) {
            throw new Error(message);
        }
    }

    function shell() {
        document.body.innerHTML = [
            '<div class="va-customer-panel" data-va-customer-panel-mount>',
            '<div data-va-customer-panel-status><span data-va-customer-panel-status-text>Cargando tus compras…</span></div>',
            '<section aria-busy="true" data-va-customer-panel-content></section>',
            '<div data-va-customer-panel-announcer></div>',
            '</div>'
        ].join('');
    }

    function deferred() {
        var resolve;
        var reject;
        var promise = new Promise(function (resolvePromise, rejectPromise) {
            resolve = resolvePromise;
            reject = rejectPromise;
        });

        return {promise: promise, resolve: resolve, reject: reject};
    }

    function tick() {
        return new Promise(function (resolve) { window.setTimeout(resolve, 0); });
    }

    function loadPanel() {
        return new Promise(function (resolve, reject) {
            var script = document.createElement('script');
            script.src = panelScript + '?run=' + Math.random();
            script.onload = resolve;
            script.onerror = function () { reject(new Error('No se pudo cargar customer-panel.js')); };
            document.head.append(script);
        });
    }

    function terminalState() {
        return {
            text: document.querySelector('[data-va-customer-panel-content]').textContent.trim(),
            busy: document.querySelector('[data-va-customer-panel-content]').getAttribute('aria-busy'),
            loaderHidden: document.querySelector('[data-va-customer-panel-status]').hidden
        };
    }

    function ignoredPanelClick(link, options) {
        var preventedByPanel;
        var observe = function (event) {
            preventedByPanel = event.defaultPrevented;
            event.preventDefault();
        };

        document.addEventListener('click', observe, {once: true});
        link.dispatchEvent(new MouseEvent('click', Object.assign({
            bubbles: true, cancelable: true, button: 0
        }, options || {})));
        return preventedByPanel === false;
    }

    function configure(get) {
        window.VeciAhorra = {
            locale: 'es-CL',
            timeZone: 'UTC',
            pages: {orders: window.location.href.split(/[?#]/)[0]},
            api: {get: get}
        };
    }

    function detailFixture(publicId, payment) {
        return {success: true, data: {
            checkout_public_id: publicId, created_at: '2026-02-03T12:30:00Z',
            visible_status: {code: 'preparing', label: 'Preparando', message: 'Mensaje resuelto'},
            requires_review: false,
            fulfillment: {method: 'delivery', label: 'Despacho'},
            summary: {subtotal: '3300.00', total: '3300.00', currency: 'CLP', product_quantity: 3, line_count: 2, order_count: 2, minimarket_count: 2},
            orders: [
                {minimarket: {name: 'Mercado Zeta', historical: false}, subtotal: '1100.00', items: [
                    {name: 'Producto Zeta', name_historical: false, image: null, image_historical: false, quantity: 1, unit_price: '1100.00', subtotal: '1100.00'}
                ]},
                {minimarket: {name: 'Mercado Alfa', historical: false}, subtotal: '2200.00', items: [
                    {name: 'Producto Alfa', name_historical: false, image: null, image_historical: false, quantity: 2, unit_price: '1100.00', subtotal: '2200.00'}
                ]}
            ],
            payment: payment,
            delivery: {method: 'delivery', status: 'assigned', label: 'Preparando despacho'},
            timeline: [
                {code: 'delivery_created', label: 'Evento Zeta', message: 'Mensaje Zeta', occurred_at: '2026-02-03T13:30:00Z'},
                {code: 'future_code', label: 'Evento Alfa', message: 'Mensaje Alfa', occurred_at: '2026-02-03T12:30:00Z'}
            ]
        }};
    }

    async function routeScenario(query, expectedReplacement, expectedCalls) {
        var nativeReplaceState = window.history.replaceState.bind(window.history);
        var nativePushState = window.history.pushState.bind(window.history);
        var cleanUrl = window.location.href.split(/[?#]/)[0];
        var replacements = [];
        var pushes = 0;
        var calls = [];

        nativeReplaceState(null, '', cleanUrl + query);
        window.history.replaceState = function (state, title, url) {
            replacements.push(String(url));
        };
        window.history.pushState = function () {
            pushes += 1;
        };
        shell();
        configure(function (path) {
            calls.push(path);
            return path === 'customer-panel/purchases'
                ? Promise.resolve({success: true, data: []})
                : new Promise(function () {});
        });
        await loadPanel();
        await tick();
        window.history.replaceState = nativeReplaceState;
        window.history.pushState = nativePushState;

        assert(pushes === 0, 'router ejecutó pushState');
        assert(calls.length === expectedCalls, 'cantidad REST incorrecta para ' + query);
        assert(calls.every(function (path) {
            return path === 'customer-panel/purchases' || path.indexOf('customer-panel/purchases/chk_') === 0;
        }), 'router llamó una ruta inesperada');
        assert(replacements.length === (expectedReplacement === null ? 0 : 1), 'cantidad de replaceState incorrecta para ' + query);

        if (expectedReplacement !== null) {
            assert(replacements[0] === expectedReplacement, 'URL canónica incorrecta para ' + query);
        }
    }

    async function rejectedScenario(name, reason) {
        var calls = 0;
        shell();
        configure(function () {
            calls += 1;
            return Promise.reject(reason);
        });
        await loadPanel();
        await tick();
        var state = terminalState();
        assert(calls === 1, name + ': llamada duplicada');
        assert(state.text === expectedError, name + ': mensaje distinto');
        assert(state.busy === 'false' && state.loaderHidden, name + ': estado no terminal');
        scenarios[name] = true;
    }

    async function directDetail(publicId, get) {
        var cleanUrl = window.location.href.split(/[?#]/)[0];

        window.history.replaceState(null, '', cleanUrl + '?compra=' + publicId);
        shell();
        configure(get);
        await loadPanel();
    }

    async function rejectedDetailScenario(name, publicId, reason) {
        var calls = [];

        await directDetail(publicId, function (path) {
            calls.push(path);
            return Promise.reject(reason);
        });
        await tick();
        assert(calls.length === 1 && calls[0] === 'customer-panel/purchases/' + publicId, name + ': GET de detalle incorrecto');
        assert(terminalState().text.includes(expectedError), name + ': mensaje distinto');
        assert(terminalState().busy === 'false', name + ': estado no terminal');
        scenarios[name] = true;
    }

    try {
        var cleanUrl = window.location.href.split(/[?#]/)[0];
        var pending = deferred();
        var calls = [];
        shell();
        configure(function (path) {
            calls.push(path);
            return pending.promise;
        });
        await loadPanel();
        assert(calls.length === 1 && calls[0] === 'customer-panel/purchases', 'GET inicial incorrecto');
        assert(document.querySelector('[data-va-customer-panel-status]').hidden === false, 'loader no visible');
        assert(document.querySelector('[data-va-customer-panel-content]').getAttribute('aria-busy') === 'true', 'aria-busy inicial incorrecto');
        scenarios.single_request = true;
        scenarios.loading = true;

        await loadPanel();
        assert(calls.length === 1, 'el guard permitió una llamada duplicada');
        scenarios.duplicate_guard = true;
        pending.resolve({success: true, data: []});
        await tick();
        var emptyState = terminalState();
        assert(emptyState.text === 'Aún no tienes compras para mostrar.', 'estado vacío incorrecto');
        assert(emptyState.busy === 'false' && emptyState.loaderHidden, 'vacío no terminal');
        scenarios.empty = true;

        var purchases = [
            {
                checkout_public_id: 'chk_' + 'P'.repeat(43), created_at: '2026-01-01T10:00:00Z',
                total: {amount: '1111.00', currency: 'CLP'}, product_quantity: 7,
                order_count: 3, minimarket_count: 1, minimarkets: ['Mercado Uno'],
                visible_status: {label: 'Estado Primero', message: 'Mensaje Primero'}
            },
            {
                checkout_public_id: 'chk_' + 'S'.repeat(43), created_at: '2026-01-02T10:00:00Z',
                total: {amount: '2222.00', currency: 'CLP'}, product_quantity: 2,
                order_count: 1, minimarket_count: 1, minimarkets: ['Mercado Dos'],
                visible_status: {label: 'Estado Segundo', message: 'Mensaje Segundo'}
            }
        ];
        var navigationCalls = [];
        shell();
        configure(function (path) {
            navigationCalls.push(path);
            return Promise.resolve(path === 'customer-panel/purchases'
                ? {success: true, data: purchases}
                : detailFixture(purchases[0].checkout_public_id, null));
        });
        await loadPanel();
        await tick();
        var items = Array.from(document.querySelectorAll('.va-customer-panel__item'));
        var resultState = terminalState();
        assert(items.length === 2, 'cantidad de resultados incorrecta');
        if (!items[0].textContent.includes('chk_' + 'P'.repeat(43))) {
            failures.push('no renderiza identificador público primero');
        }
        if (!items[1].textContent.includes('chk_' + 'S'.repeat(43))) {
            failures.push('no renderiza identificador público segundo');
        }
        assert(items[0].textContent.includes('Mercado Uno') && items[1].textContent.includes('Mercado Dos'), 'orden alterado');
        assert(items[0].textContent.includes('Estado Primero') && items[0].textContent.includes('Mensaje Primero'), 'estado o mensaje alterado');
        assert(items[0].textContent.includes('7 productos') && items[0].textContent.includes('3 pedidos'), 'cantidades alteradas');
        assert(items[0].textContent.includes('1.111'), 'total no representado');
        assert(resultState.busy === 'false' && resultState.loaderHidden, 'resultados no terminales');
        scenarios.results = failures.length === 0;

        var purchaseLinks = Array.from(document.querySelectorAll('.va-customer-panel__purchase-link'));
        var expectedDetailUrl = new URL(cleanUrl);
        expectedDetailUrl.searchParams.set('compra', purchases[0].checkout_public_id);
        assert(purchaseLinks.length === 2, 'faltan enlaces reales de compras');
        assert(purchaseLinks[0].href === expectedDetailUrl.href, 'href de detalle no es canónico');
        var nativePushForNavigation = window.history.pushState.bind(window.history);
        var nativeReplaceForNavigation = window.history.replaceState.bind(window.history);
        var pushesForNavigation = [];
        var nativeScrollTo = window.scrollTo.bind(window);
        var restoredScroll = null;
        window.history.pushState = function (state, title, url) {
            pushesForNavigation.push(String(url));
            nativePushForNavigation(state, title, url);
        };
        window.scrollTo = function (x, y) { restoredScroll = [x, y]; };
        var guardLink = purchaseLinks[0].cloneNode(true);
        guardLink.href = 'javascript:void(0)';
        document.querySelector('[data-va-customer-panel-content]').append(guardLink);
        assert(ignoredPanelClick(guardLink, {ctrlKey: true}), 'click con Ctrl fue interceptado');
        assert(ignoredPanelClick(guardLink, {metaKey: true}), 'click con Meta fue interceptado');
        assert(ignoredPanelClick(guardLink, {shiftKey: true}), 'click con Shift fue interceptado');
        assert(ignoredPanelClick(guardLink, {altKey: true}), 'click con Alt fue interceptado');
        assert(ignoredPanelClick(guardLink, {button: 1}), 'click no primario fue interceptado');
        guardLink.target = '_parent';
        assert(ignoredPanelClick(guardLink), 'target alternativo fue interceptado');
        guardLink.className = '';
        guardLink.removeAttribute('target');
        assert(ignoredPanelClick(guardLink), 'enlace ajeno al panel fue interceptado');
        guardLink.remove();
        assert(navigationCalls.length === 1 && pushesForNavigation.length === 0, 'click ignorado alteró REST o History');
        purchaseLinks[0].click();
        assert(pushesForNavigation[0] === expectedDetailUrl.href, 'apertura no ejecutó pushState canónico');
        assert(document.querySelector('.va-customer-panel__detail-title'), 'no mostró heading de carga de detalle');
        assert(document.querySelector('[data-va-customer-panel-content]').getAttribute('aria-busy') === 'true', 'detalle sin aria-busy');
        assert(document.querySelector('.va-loader[role="status"][aria-live="polite"]'), 'loader de detalle no es anunciable');
        await tick();
        assert(navigationCalls.length === 2 && navigationCalls[1] === 'customer-panel/purchases/' + purchases[0].checkout_public_id, 'apertura no ejecutó un GET de detalle');
        assert(document.querySelector('[data-va-customer-panel-content]').getAttribute('aria-busy') === 'false', 'detalle válido no terminó loading');
        document.querySelector('.va-customer-panel__back-link').click();
        await tick();
        assert(document.querySelectorAll('.va-customer-panel__item').length === 2, 'snapshot no restaurado');
        assert(restoredScroll && restoredScroll[0] === 0, 'scroll no restaurado');
        assert(document.activeElement === purchaseLinks[0], 'foco no restaurado al enlace originador');
        assert(pushesForNavigation.length === 2 && pushesForNavigation[1] === cleanUrl, 'retorno no ejecutó pushState a lista');
        purchaseLinks[1].click();
        await tick();
        nativeReplaceForNavigation(null, '', cleanUrl);
        window.dispatchEvent(new PopStateEvent('popstate'));
        await tick();
        assert(document.querySelectorAll('.va-customer-panel__item').length === 2, 'popstate no restauró snapshot');
        assert(document.activeElement === purchaseLinks[1], 'popstate no restauró foco');
        assert(pushesForNavigation.length === 3, 'popstate ejecutó pushState');
        assert(navigationCalls.length === 3, 'popstate solicitó REST adicional');
        window.history.pushState = nativePushForNavigation;
        window.scrollTo = nativeScrollTo;
        scenarios.navigation = true;
        scenarios.snapshot = true;
        scenarios.popstate_snapshot = true;
        scenarios.detail_opening = true;
        scenarios.detail_snapshot_return = true;
        scenarios.navigation_click_guards = true;

        var stale = deferred();
        var staleCalls = 0;
        var abortsOnNavigation = 0;
        var NativeAbortForNavigation = window.AbortController;
        window.AbortController = function () {
            this.signal = {};
            this.abort = function () { abortsOnNavigation += 1; };
        };
        shell();
        configure(function (path) {
            staleCalls += 1;
            return path === 'customer-panel/purchases'
                ? stale.promise
                : new Promise(function () {});
        });
        await loadPanel();
        var syntheticLink = document.createElement('a');
        syntheticLink.className = 'va-customer-panel__purchase-link';
        syntheticLink.href = expectedDetailUrl.href;
        syntheticLink.textContent = 'Abrir';
        document.querySelector('[data-va-customer-panel-content]').append(syntheticLink);
        syntheticLink.click();
        stale.resolve({success: true, data: purchases});
        await tick();
        assert(staleCalls === 2, 'concurrencia no separó listado y detalle');
        assert(abortsOnNavigation === 1, 'navegación no abortó exactamente una solicitud');
        assert(document.querySelector('.va-customer-panel__detail-title'), 'respuesta obsoleta reemplazó detalle');
        assert(document.querySelectorAll('.va-customer-panel__item').length === 0, 'respuesta obsoleta renderizó lista');
        window.AbortController = NativeAbortForNavigation;
        scenarios.concurrency = true;
        scenarios.stale_response = true;
        window.history.replaceState(null, '', cleanUrl);

        await rejectedScenario('http_error', {status: 500});
        await rejectedScenario('network_error', {status: 0, code: 'network_error'});
        await rejectedScenario('invalid_json', {status: 200, code: 'invalid_json'});

        shell();
        configure(function () { return Promise.resolve({success: true, data: {invalid: true}}); });
        await loadPanel();
        await tick();
        var invalidState = terminalState();
        assert(invalidState.text === expectedError, 'contrato inválido no usa error genérico');
        assert(invalidState.busy === 'false' && invalidState.loaderHidden, 'contrato inválido no terminal');
        scenarios.invalid_contract = true;

        var aborts = 0;
        var NativeAbortController = window.AbortController;
        window.AbortController = function () {
            this.signal = {};
            this.abort = function () { aborts += 1; };
        };
        shell();
        configure(function () { return new Promise(function () {}); });
        await loadPanel();
        await new Promise(function (resolve) { window.setTimeout(resolve, 12010); });
        var timeoutState = terminalState();
        assert(aborts === 1, 'AbortController.abort no se ejecutó exactamente una vez');
        assert(timeoutState.text === expectedError, 'timeout no usa error genérico');
        assert(timeoutState.busy === 'false' && timeoutState.loaderHidden, 'timeout no terminal');
        window.AbortController = NativeAbortController;
        scenarios.timeout = true;

        var validId = 'chk_' + 'A'.repeat(43);
        var detailCalls = [];
        var detailPending = deferred();
        await directDetail(validId, function (path) {
            detailCalls.push(path);
            return detailPending.promise;
        });
        assert(detailCalls.length === 1 && detailCalls[0] === 'customer-panel/purchases/' + validId, 'deep link no ejecutó un único GET de detalle');
        assert(document.querySelector('.va-loader[role="status"]'), 'deep link no mostró loading de detalle');
        assert(terminalState().busy === 'true', 'deep link no mantuvo aria-busy');
        var nativeImageSource = Object.getOwnPropertyDescriptor(HTMLImageElement.prototype, 'src');
        Object.defineProperty(HTMLImageElement.prototype, 'src', {
            configurable: true,
            get: function () { return this.dataset.testSource || ''; },
            set: function (value) { this.dataset.testSource = String(value); }
        });
        var validImageDetail = detailFixture(validId, null);
        validImageDetail.data.orders[1].items[0].image = 'https://example.test/producto.jpg';
        detailPending.resolve(validImageDetail);
        await tick();
        var detailText = terminalState().text;
        var detailOrders = Array.from(document.querySelectorAll('.va-customer-panel__detail-order'));
        assert(detailOrders.length === 2, 'detalle no renderizó todas las órdenes');
        assert(detailOrders[0].textContent.includes('Mercado Zeta') && detailOrders[1].textContent.includes('Mercado Alfa'), 'detalle alteró el orden recibido');
        assert(detailText.includes(validId) && detailText.includes('Preparando') && detailText.includes('Mensaje resuelto'), 'encabezado de detalle incompleto');
        assert(detailText.includes('Cantidad de productos') && detailText.includes('3') && detailText.includes('Líneas'), 'resumen de detalle incompleto');
        assert(detailText.includes('Producto Zeta') && detailText.includes('Producto Alfa'), 'productos no renderizados');
        assert(detailText.includes('Información de pago no disponible.'), 'payment null no mostró el mensaje previsto');
        assert(detailText.includes('Preparando despacho'), 'entrega no renderizada');
        var timelineEntries = Array.from(document.querySelectorAll('.va-customer-panel__timeline-entry'));
        assert(timelineEntries.length === 2, 'timeline no renderizó todas las entradas');
        assert(timelineEntries[0].textContent.includes('Evento Zeta') && timelineEntries[1].textContent.includes('Evento Alfa'), 'timeline alteró el orden recibido');
        assert(timelineEntries[0].textContent.includes('Mensaje Zeta') && timelineEntries[1].textContent.includes('Mensaje Alfa'), 'timeline alteró los mensajes');
        assert(timelineEntries[0].querySelector('time').dateTime === '2026-02-03T13:30:00Z', 'timeline alteró el timestamp');
        assert(timelineEntries[0].classList.contains('va-customer-panel__timeline-entry--completed'), 'código permitido no recibió decoración');
        assert(timelineEntries[1].classList.contains('va-customer-panel__timeline-entry--neutral'), 'código desconocido no recibió decoración neutra');
        assert(document.querySelectorAll('.va-customer-panel__detail-image').length === 1, 'imagen disponible no fue renderizada');
        assert(document.querySelectorAll('.va-customer-panel__detail-image-placeholder[aria-hidden="true"]').length === 1, 'imagen ausente no mostró placeholder decorativo');
        document.querySelector('.va-customer-panel__detail-image').dispatchEvent(new Event('error'));
        assert(document.querySelectorAll('.va-customer-panel__detail-image').length === 0, 'imagen fallida permaneció rota');
        assert(document.querySelectorAll('.va-customer-panel__detail-image-placeholder[aria-hidden="true"]').length === 2, 'imagen fallida no fue reemplazada por placeholder');
        Object.defineProperty(HTMLImageElement.prototype, 'src', nativeImageSource);
        assert(terminalState().busy === 'false', 'detalle válido no terminó loading');
        scenarios.detail_direct = true;
        scenarios.detail_valid = true;
        scenarios.detail_payment_null = true;
        scenarios.detail_timeline = true;
        scenarios.detail_media = true;
        scenarios.detail_image_error = true;

        var unsafeImageDetail = detailFixture(validId, null);
        unsafeImageDetail.data.orders[1].items[0].image = 'javascript:alert(1)';
        await directDetail(validId, function () { return Promise.resolve(unsafeImageDetail); });
        await tick();
        assert(document.querySelectorAll('.va-customer-panel__detail-image').length === 0, 'detalle aceptó un esquema de imagen inseguro');
        assert(document.querySelectorAll('.va-customer-panel__detail-image-placeholder').length === 2, 'imagen insegura no mostró placeholder');
        assert(terminalState().text.includes('Producto Alfa'), 'imagen insegura ocultó el producto');
        scenarios.detail_image_safety = true;

        var paid = {status: 'received', label: 'Pago recibido', amount: '3300.00', currency: 'CLP', paid_at: '2026-02-03T12:35:00Z', method: 'Webpay Plus'};
        await directDetail(validId, function () { return Promise.resolve(detailFixture(validId, paid)); });
        await tick();
        detailText = terminalState().text;
        assert(detailText.includes('Pago recibido') && detailText.includes('Webpay Plus') && detailText.includes('3.300'), 'pago presente incompleto');
        scenarios.detail_payment = true;

        await directDetail(validId, function () { return Promise.reject({status: 404}); });
        await tick();
        assert(terminalState().text.includes('La compra no está disponible.'), '404 no converge en not_found');
        assert(!terminalState().text.includes('404'), '404 expuso código interno');
        scenarios.detail_404 = true;
        await rejectedDetailScenario('detail_http_error', validId, {status: 500});
        await rejectedDetailScenario('detail_network_error', validId, {status: 0});
        await rejectedDetailScenario('detail_invalid_json', validId, {code: 'invalid_json'});

        await directDetail(validId, function () { return Promise.resolve({success: true, data: {invalid: true}}); });
        await tick();
        assert(terminalState().text.includes(expectedError), 'contrato de detalle inválido no converge en error');
        scenarios.detail_invalid_contract = true;

        var nativeDetailTimeout = window.setTimeout;
        var detailTimeoutAborts = 0;
        var NativeDetailAbort = window.AbortController;
        window.setTimeout = function (callback, delay) {
            return nativeDetailTimeout(callback, delay === 12000 ? 0 : delay);
        };
        window.AbortController = function () {
            this.signal = {};
            this.abort = function () { detailTimeoutAborts += 1; };
        };
        await directDetail(validId, function () { return new Promise(function () {}); });
        await tick();
        assert(detailTimeoutAborts === 1, 'timeout de detalle no abortó exactamente una vez');
        assert(terminalState().text.includes(expectedError), 'timeout de detalle no converge en error');
        window.setTimeout = nativeDetailTimeout;
        window.AbortController = NativeDetailAbort;
        scenarios.detail_timeout = true;

        var staleDetail = deferred();
        var secondId = 'chk_' + 'B'.repeat(43);
        await directDetail(validId, function (path) {
            return path.endsWith(validId)
                ? staleDetail.promise
                : Promise.resolve(detailFixture(secondId, null));
        });
        window.history.replaceState(null, '', cleanUrl + '?compra=' + secondId);
        window.dispatchEvent(new PopStateEvent('popstate'));
        await tick();
        assert(terminalState().text.includes(secondId), 'segunda respuesta de detalle no fue renderizada');
        staleDetail.resolve(detailFixture(validId, paid));
        await tick();
        assert(terminalState().text.includes(secondId) && !terminalState().text.includes(validId), 'respuesta obsoleta de detalle reemplazó la vista vigente');
        scenarios.detail_stale_response = true;

        await routeScenario('', null, 1);
        await routeScenario('?extra=1#fragment', cleanUrl, 1);
        await routeScenario('?compra=' + validId, null, 1);
        await routeScenario(
            '?compra=' + validId + '&extra=1#fragment',
            cleanUrl + '?compra=' + validId,
            1
        );
        await routeScenario('?compra=', null, 0);
        await routeScenario('?compra=uno&compra=dos', null, 0);
        await routeScenario('?compra=chk_invalido', null, 0);
        await routeScenario('?compra=%20' + validId + '%20', null, 0);
        await routeScenario('?compra=%E0%A4%A', null, 0);
        assert(document.querySelector('[data-va-customer-panel-content]').textContent.includes('La compra no está disponible.'), 'ruta inválida no mostró not_found');
        scenarios.router = true;
        scenarios.canonicalization = true;

        var nativeReplaceState = window.history.replaceState.bind(window.history);
        var nativePushState = window.history.pushState.bind(window.history);
        var popReplacements = 0;
        var popPushes = 0;
        nativeReplaceState(null, '', cleanUrl + '?compra=' + validId);
        window.history.replaceState = function () { popReplacements += 1; };
        window.history.pushState = function () { popPushes += 1; };
        window.dispatchEvent(new PopStateEvent('popstate'));
        await tick();
        assert(document.querySelector('.va-customer-panel__detail-title'), 'popstate válido no entró a loading de detalle');
        nativeReplaceState(null, '', cleanUrl + '?compra=');
        window.dispatchEvent(new PopStateEvent('popstate'));
        await tick();
        assert(document.querySelector('[data-va-customer-panel-content]').textContent.includes('La compra no está disponible.'), 'popstate inválido no mostró not_found');
        window.history.replaceState = nativeReplaceState;
        window.history.pushState = nativePushState;
        assert(popReplacements === 0 && popPushes === 0, 'popstate modificó el historial');
        scenarios.popstate = true;

        if (failures.length > 0) {
            throw new Error(failures.join('; '));
        }

        document.body.innerHTML = '<pre id="test-results" data-status="pass"></pre>';
        document.getElementById('test-results').textContent = JSON.stringify({scenarios: scenarios});
    } catch (error) {
        document.body.innerHTML = '<pre id="test-results" data-status="fail"></pre>';
        document.getElementById('test-results').textContent = JSON.stringify({
            scenarios: scenarios,
            message: error && error.message ? error.message : String(error)
        });
    }
}());
</script>
</body>
</html>
