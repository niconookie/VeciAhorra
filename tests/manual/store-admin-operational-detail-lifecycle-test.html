<!doctype html><html lang="es"><head><meta charset="utf-8"><title>RUNNING</title></head><body>
<pre id="test-results" data-status="running">RUNNING</pre>
<div data-va-store-detail data-va-store-detail-initialized="true"><header><h1>Detalle</h1><p data-va-store-detail-identity></p><div data-va-store-detail-badge></div></header><div data-va-store-detail-messages tabindex="-1"></div><main data-va-store-detail-main><section><div data-va-store-detail-summary></div></section><section><div data-va-store-detail-lifecycle></div></section><section><div data-va-store-detail-commercial></div></section><section><div data-va-store-detail-actions></div></section><section><div data-va-store-detail-sensitive></div></section></main></div>
<script type="module">
import {createStoreDetailCoordinator} from '../../assets/admin/js/modules/stores/detail-app.js?lifecycle-harness';
import {createStoreDetailView} from '../../assets/admin/js/modules/stores/detail-view.js';
const output=document.getElementById('test-results'),root=document.querySelector('[data-va-store-detail]');
const assert=(value,message)=>{if(!value)throw new Error(message)};const wait=()=>new Promise(resolve=>setTimeout(resolve,20));
const dto=(overrides={})=>({id:25,business_name:'Mercado Seguro',legal_name:'Legal',owner_name:'Dueña',rut:'1-9',email:'safe@example.test',phone:'',mobile:null,address:null,commune:'Santiago',city:'Santiago',region:'RM',status:'pending',onboarding_status:'draft',approved_at:null,lifecycle_state:'draft',allowed_actions:['save','submit_for_review','delete_if_unreferenced'],created_at:'2026-01-01 00:00:00',updated_at:'2026-01-02 00:00:00',...overrides});
const wrap=item=>({success:true,data:item});
try {
 let gets=0,transitions=0;const view=createStoreDetailView(root);const api={get:async()=>{gets++;return gets===1?wrap(dto()):wrap(dto({status:'pending',onboarding_status:'complete',lifecycle_state:'in_review',allowed_actions:['save','approve','reject']}));},transition:async action=>{transitions++;assert(action==='submit_for_review','Acción incorrecta.');return wrap(dto({status:'pending',onboarding_status:'complete',lifecycle_state:'in_review',allowed_actions:['save','approve','reject']}));}};
 const coordinator=createStoreDetailCoordinator({rootNode:root,config:{storeId:25},api,view});coordinator.load();await wait();
 assert(root.querySelectorAll('[data-va-store-lifecycle-action]').length===1&&!root.textContent.includes('Eliminar'),'Save/delete crearon botones lifecycle.');
 coordinator.openLifecycle('submit_for_review');assert(root.dataset.vaStoreDetailState==='confirming'&&transitions===0&&gets===1,'Abrir confirmación hizo request.');assert(document.activeElement?.textContent.includes('Confirmar:'),'Foco de confirmación incorrecto.');
 coordinator.cancelLifecycle();assert(transitions===0&&gets===1&&document.activeElement?.dataset.vaStoreLifecycleAction==='submit_for_review','Cancelar hizo request o perdió foco.');
 coordinator.openLifecycle('submit_for_review');coordinator.confirmLifecycle();coordinator.confirmLifecycle();assert(transitions===1,'Doble confirmación mutó dos veces.');await wait();assert(gets===2&&root.textContent.includes('En revisión')&&root.textContent.includes('Minimarket enviado a revisión.'),'No aplicó GET autoritativo/mensaje.');assert(root.querySelectorAll('[data-va-store-lifecycle-action]').length===2,'No recalculó acciones.');
 const scenario=async(api)=>{const events=[];const fakeRoot={isConnected:true,removeEventListener:()=>{}};const fakeView={loading:()=>{},render:(item,options={})=>events.push(['render',item.lifecycle_state,options]),error:message=>events.push(['error',message]),confirmLifecycle:()=>{},transitioning:()=>{}};const subject=createStoreDetailCoordinator({rootNode:fakeRoot,config:{storeId:25},api,view:fakeView});subject.load();await wait();subject.openLifecycle('submit_for_review');subject.confirmLifecycle();await wait();return{events,subject,fakeRoot};};
 let conflictGets=0,conflictPosts=0;let result=await scenario({get:async()=>{conflictGets++;return conflictGets===1?wrap(dto()):wrap(dto({status:'pending',onboarding_status:'complete',lifecycle_state:'in_review',allowed_actions:['approve','reject']}));},transition:async()=>{conflictPosts++;throw{status:409};}});assert(conflictPosts===1&&conflictGets===2&&result.events.at(-1)[2].warning.includes('cambió'),'Conflicto no hizo un GET o reintentó.');
 let uncertainGets=0;result=await scenario({get:async()=>{uncertainGets++;return wrap(dto());},transition:async()=>{throw{status:0};}});assert(uncertainGets===1&&result.events.at(-1)[0]==='error'&&result.events.at(-1)[1].includes('confirmar el resultado'),'Red incierta reactivó controles o hizo GET.');
 let processedGets=0;result=await scenario({get:async()=>{processedGets++;if(processedGets===1)return wrap(dto());throw{status:500};},transition:async()=>wrap(dto({status:'pending',onboarding_status:'complete',lifecycle_state:'in_review',allowed_actions:['approve']}))});assert(processedGets===2&&result.events.at(-1)[0]==='error'&&result.events.at(-1)[1].includes('fue procesada'),'POST exitoso + GET fallido no es honesto.');
 let conflictFailureGets=0;result=await scenario({get:async()=>{conflictFailureGets++;if(conflictFailureGets===1)return wrap(dto());throw{status:500};},transition:async()=>{throw{status:409};}});assert(conflictFailureGets===2&&result.events.at(-1)[0]==='error'&&result.events.at(-1)[1].includes('estado cambió'),'Conflicto + GET fallido no retiró controles.');
 output.dataset.status='pass';output.textContent=JSON.stringify({gets,transitions,buttons:2,conflictGets,uncertainGets,processedGets});document.title='PASS';
}catch(error){output.dataset.status='fail';output.textContent=JSON.stringify({message:error.message,stack:error.stack});document.title='FAIL';}
</script></body></html>
