<!doctype html>
<html lang="es">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width"><title>Public checkout validation browser test</title></head>
<body>
<div class="veciahorra-frontend"><section data-va-checkout>
    <div data-va-checkout-loading></div>
    <div data-va-checkout-error hidden><p data-va-checkout-error-message></p><button data-va-checkout-retry>Reintentar</button></div>
    <div data-va-checkout-empty hidden>Vacío</div>
    <div data-va-checkout-content hidden>
        <div data-va-checkout-groups></div><strong data-va-checkout-total></strong>
        <section tabindex="-1" aria-live="assertive" data-va-checkout-validation-errors hidden><h2>Errores</h2><ul data-va-checkout-validation-error-list></ul></section>
        <form data-va-checkout-form novalidate>
            <div class="va-field"><input name="first_name" required data-va-field><p id="first-error" data-va-field-error hidden></p></div>
            <div class="va-field"><input name="last_name" required data-va-field><p id="last-error" data-va-field-error hidden></p></div>
            <div class="va-field"><input name="phone" type="tel" required data-va-field><p id="phone-error" data-va-field-error hidden></p></div>
            <div class="va-field"><input name="email" type="email" required data-va-field><p id="email-error" data-va-field-error hidden></p></div>
            <fieldset><legend>Método de entrega</legend><div data-va-delivery-options></div><p data-va-delivery-minimum hidden></p></fieldset>
            <section data-va-delivery-fields hidden>
                <div class="va-field"><input name="address" data-va-field><p id="address-error" data-va-field-error hidden></p></div>
                <div class="va-field"><input name="commune" data-va-field><p id="commune-error" data-va-field-error hidden></p></div>
                <div class="va-field"><input name="reference" data-va-field></div>
                <div class="va-field"><textarea name="notes" data-va-field></textarea></div>
            </section>
            <button type="submit" data-va-checkout-submit disabled>Continuar al pago</button>
            <p role="status" aria-live="polite" data-va-checkout-status hidden></p>
        </form>
    </div>
</section></div>
<pre id="result">RUNNING</pre>
<script>
    var calls = [];
    var postHandler = null;
    function deferred() { var value = {}; value.promise = new Promise(function (resolve, reject) { value.resolve = resolve; value.reject = reject; }); return value; }
    function cartItem(id, subtotal) { return { id: id, product_id: 100 + id, inventory_id: 200 + id, minimarket_id: 1, minimarket_name: 'Minimarket', product_name: 'Producto ' + id, quantity: 1, unit_price_snapshot: subtotal, subtotal: subtotal }; }
    function validatedItem(id, subtotal, valid, errors) { return { id: id, product_id: 100 + id, inventory_id: 200 + id, minimarket_id: 1, quantity: 1, unit_price_snapshot: subtotal, subtotal: subtotal, valid: valid, errors: errors || [] }; }
    function response(items, valid, errors, total) { var validCount = items.filter(function (item) { return item.valid; }).length; return { success: true, data: { valid: valid, errors: errors, items: items, summary: { item_count: items.length, valid_item_count: validCount, invalid_item_count: items.length - validCount, total: total } } }; }
    window.VeciAhorra = {
        locale: 'es-CL', currency: 'CLP', currentUser: { id: 0, loggedIn: false },
        cart: { sessionHeader: 'X-Veciahorra-Cart-Session', sessionId: 'guest-session' },
        checkout: { minimumDeliveryAmount: 8000 },
        api: {
            get: function (path, options) { calls.push({ method: 'GET', path: path, options: options }); return Promise.resolve({ success: true, data: [cartItem(1, '8100.00')], total: '8100.00' }); },
            post: function (path, body, options) { calls.push({ method: 'POST', path: path, body: body, options: options }); return postHandler(path, body, options); }
        }
    };
</script>
<script src="../../assets/frontend/js/veciahorra-checkout.js"></script>
<script>
    (function () {
        'use strict';
        var root = document.querySelector('[data-va-checkout]');
        var form = root.querySelector('form');
        var submit = root.querySelector('[data-va-checkout-submit]');
        var status = root.querySelector('[data-va-checkout-status]');
        var errors = root.querySelector('[data-va-checkout-validation-errors]');
        var result = document.getElementById('result');
        function assert(value, message) { if (!value) { throw new Error(message); } }
        function wait() { return new Promise(function (resolve) { setTimeout(resolve, 30); }); }
        function ready() { return new Promise(function (resolve) { (function check() { root.vaCheckout ? resolve() : setTimeout(check, 10); }()); }); }
        function input(name, value) { var field = form.elements[name]; field.value = value; field.dispatchEvent(new Event('input', { bubbles: true })); }
        function submitForm() { form.dispatchEvent(new Event('submit', { bubbles: true, cancelable: true })); }
        function changeValue() { input('reference', String(Date.now())); }
        function rejection(statusCode, message) { postHandler = function () { return Promise.reject({ status: statusCode, code: 'request_error', message: message }); }; changeValue(); submitForm(); return wait(); }

        ready().then(wait).then(function () {
            assert(calls.length === 1 && calls[0].method === 'GET', 'carga inicial GET cart');
            assert(root.vaCheckout.getSummary().totalCents === 810000, 'total inicial 8100');
            input('first_name', 'Ana'); input('last_name', 'Pérez'); input('phone', '+56 9 1234 5678'); input('email', 'ana@example.test');
            var delivery = form.querySelector('input[value="delivery"]'); delivery.checked = true; delivery.dispatchEvent(new Event('change', { bubbles: true }));
            input('address', 'Calle 1'); input('commune', 'Santiago');
            assert(!submit.disabled, 'formulario habilitado');
            var pending = deferred(); postHandler = function () { return pending.promise; };
            submitForm(); submitForm();
            assert(calls.filter(function (call) { return call.method === 'POST'; }).length === 1, 'doble clic una solicitud');
            var post = calls[calls.length - 1];
            assert(post.path === '/checkout/validate', 'endpoint validate exacto');
            assert(JSON.stringify(post.body) === '{}', 'payload vacio exacto');
            assert(post.options.headers['X-Veciahorra-Cart-Session'] === 'guest-session', 'identidad invitada');
            assert(submit.disabled && submit.textContent === 'Validando…' && submit.getAttribute('aria-busy') === 'true', 'loading accesible');
            pending.resolve(response([validatedItem(1, '7600.00', true)], true, [], '7600.00'));
            return wait();
        }).then(function () {
            assert(root.vaCheckout.getSummary().totalCents === 760000, 'backend reemplaza total');
            assert(form.querySelectorAll('input[name="delivery_method"]').length === 1, 'RB fuerza retiro');
            assert(form.querySelector('input[value="pickup"]').checked, 'retiro seleccionado');
            assert(root.querySelector('[data-va-delivery-fields]').hidden && !form.elements.address.required, 'campos despacho ocultos');
            assert(status.textContent.includes('método de entrega cambió') && status.textContent.includes('Compra validada correctamente'), 'avisos validacion y cambio');
            assert(submit.textContent === 'Continuar' && !submit.disabled, 'boton recuperado tras exito');
            var count = calls.length; submitForm(); assert(calls.length === count, 'Continuar no inicia transaccion');
            input('first_name', 'Ana María');
            assert(submit.textContent === 'Continuar al pago' && !status.textContent.includes('Compra validada'), 'cambio invalida validacion');

            postHandler = function () { return Promise.resolve(response([validatedItem(1, '8000.00', true)], true, [], '8000.00')); };
            submitForm(); return wait();
        }).then(function () {
            assert(root.vaCheckout.getSummary().totalCents === 800000, 'total validado 8000');
            assert(form.querySelectorAll('input[name="delivery_method"]').length === 2, '8000 conserva despacho');

            var itemA = validatedItem(1, '1000.00', false, [{ code: 'insufficient_stock', message: 'Sin stock.' }]);
            var itemB = validatedItem(2, '900.00', false, [{ code: 'product_inactive', message: 'Producto no disponible.' }]);
            var problems = [
                { cart_item_id: 1, code: 'insufficient_stock', message: 'Sin stock.' },
                { cart_item_id: 1, code: 'price_changed', message: 'El precio cambió.' },
                { cart_item_id: 2, code: 'product_inactive', message: 'Producto no disponible.' },
                { cart_item_id: 2, code: 'inventory_not_found', message: 'Inventario no disponible.' },
                { cart_item_id: 2, code: 'invalid_quantity', message: 'Cantidad inválida.' },
                { cart_item_id: 2, code: 'minimarket_inactive', message: 'Minimarket no disponible.' }
            ];
            postHandler = function () { return Promise.resolve(response([itemA, itemB], false, problems, '0.00')); };
            changeValue(); submitForm(); return wait();
        }).then(function () {
            assert(errors.querySelectorAll('li').length === 6, 'multiples errores acumulados');
            assert(document.activeElement === errors, 'foco al resumen de errores');
            assert(!status.textContent.includes('Compra validada'), 'error no valida compra');
            assert(submit.textContent === 'Continuar al pago' && !submit.disabled, 'boton recuperado tras error negocio');

            return [400, 404, 409, 422, 500].reduce(function (promise, code) {
                return promise.then(function () { return rejection(code, 'Error HTTP ' + code); }).then(function () {
                    assert(errors.textContent.includes(code >= 500 ? 'error interno' : 'Error HTTP ' + code), 'HTTP ' + code + ' controlado');
                    assert(!submit.disabled, 'boton recuperado HTTP ' + code);
                });
            }, Promise.resolve());
        }).then(function () {
            postHandler = function () { return Promise.reject({ code: 'timeout', message: 'Timeout' }); }; changeValue(); submitForm(); return wait();
        }).then(function () {
            assert(errors.textContent.includes('tardó demasiado'), 'timeout controlado');
            postHandler = function () { return Promise.reject({ status: 0, code: 'network_error', message: 'Error de red.' }); }; changeValue(); submitForm(); return wait();
        }).then(function () {
            assert(errors.textContent.includes('Error de red'), 'red controlada');
            var invalidPayloads = [null, {}, { success: true, data: null }, { success: true, data: { valid: true, errors: [], items: [], summary: {} } }];
            return invalidPayloads.reduce(function (promise, payload) {
                return promise.then(function () { postHandler = function () { return Promise.resolve(payload); }; changeValue(); submitForm(); return wait(); }).then(function () {
                    assert(errors.textContent.includes('incompleta') || errors.textContent.includes('incompleto'), 'respuesta invalida controlada');
                });
            }, Promise.resolve());
        }).then(function () {
            var stale = deferred(); postHandler = function () { return stale.promise; }; changeValue(); submitForm();
            input('notes', 'cambio durante request');
            stale.resolve(response([validatedItem(1, '9000.00', true)], true, [], '9000.00'));
            return wait();
        }).then(function () {
            assert(root.vaCheckout.getSummary().totalCents !== 900000, 'respuesta obsoleta ignorada');
            assert(calls.every(function (call) { return (call.method === 'GET' && call.path === '/cart') || (call.method === 'POST' && call.path === '/checkout/validate'); }), 'sin rutas transaccionales');
            document.body.setAttribute('data-result', 'PASS'); result.textContent = 'PASS public-checkout-browser-test';
        }).catch(function (error) { document.body.setAttribute('data-result', 'FAIL'); result.textContent = 'FAIL ' + error.message; });
    }());
</script>
</body>
</html>
